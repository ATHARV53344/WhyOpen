<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blocked – WHYOPEN</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --accent: #6366f1; }
    html, body {
      height: 100%;
      background: #080810;
      color: #f0eeff;
      font-family: 'Syne', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .bg-orb { position: fixed; border-radius: 50%; filter: blur(100px); opacity: 0.12; pointer-events: none; }
    .o1 { width:500px; height:500px; background:radial-gradient(#6366f1,transparent); top:-150px; left:-100px; }
    .o2 { width:400px; height:400px; background:radial-gradient(#ef4444,transparent); bottom:-100px; right:-50px; }
    .card {
      position: relative; z-index: 10; text-align: center;
      padding: 60px 50px; max-width: 480px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 28px;
      box-shadow: 0 40px 100px rgba(0,0,0,0.5);
      animation: up 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes up { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
    .block-icon { font-size: 64px; display: block; margin-bottom: 24px; animation: shake 0.5s 0.3s ease both; }
    @keyframes shake { 0%,100%{transform:rotate(0)} 25%{transform:rotate(-5deg)} 75%{transform:rotate(5deg)} }
    h1 {
      font-size: 32px; font-weight: 800; margin-bottom: 8px;
      background: linear-gradient(135deg,#fff,rgba(255,255,255,0.6));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .blocked-url { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: rgba(255,255,255,0.3); margin-bottom: 20px; }
    p { font-size: 15px; color: rgba(255,255,255,0.5); line-height: 1.6; margin-bottom: 32px; }
    p strong { color: rgba(255,255,255,0.9); }
    .btn-row { display: flex; gap: 12px; justify-content: center; }
    .btn-primary {
      background: linear-gradient(135deg,#6366f1,#7c3aed); border: none;
      border-radius: 12px; padding: 12px 24px; color: white;
      font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all 0.2s ease;
      box-shadow: 0 4px 20px rgba(99,102,241,0.3);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(99,102,241,0.4); }
    .btn-secondary {
      background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; padding: 12px 24px; color: rgba(255,255,255,0.5);
      font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: all 0.2s ease;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9); }
    .motivational {
      margin-top: 28px; padding: 14px 20px;
      background: rgba(99,102,241,0.08); border: 1px solid rgba(99,102,241,0.2);
      border-radius: 12px; font-size: 13px; color: #a5b4fc; font-style: italic;
    }
  </style>
</head>
<body>
  <div class="bg-orb o1"></div>
  <div class="bg-orb o2"></div>
  <div class="card">
    <span class="block-icon">🛡️</span>
    <h1>Blocked by WHYOPEN</h1>
    <div class="blocked-url" id="blockedUrl">This site</div>
    <p>You're in <strong>Focus Mode</strong>. This site is on your block list. Stay on track with what matters.</p>
    <div class="btn-row">
      <button class="btn-primary" id="goBackBtn">← Go Back</button>
      <button class="btn-secondary" id="disableFocusBtn">Disable Focus Mode</button>
    </div>
    <div class="motivational" id="quote"></div>
  </div>
  <script src="blocked.js"></script>
</body>
</html>
